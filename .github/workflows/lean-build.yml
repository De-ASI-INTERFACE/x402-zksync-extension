name: Lean 4 + Mathlib Build and Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: lake build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Elan + Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --no-modify-path
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Generate lake-manifest.json
        run: lake update

      - name: Build with lean-action
        uses: leanprover/lean-action@v1
        with:
          build: true
          use-mathlib-cache: true
          lake-package-directory: .
